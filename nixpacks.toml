[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install --include=optional"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=ChatRuleSeeder --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
